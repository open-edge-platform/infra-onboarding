name: Post-Merge Tink Worker

on:
  push:
    branches:
      - main
      - release-*
    paths:
      - "tink-worker/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-merge-pipeline:
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    uses: open-edge-platform/orch-ci/.github/workflows/post-merge.yml@8c821b1ef02ffc9a4658cec8aa196835cb50703f  # 2026.0.17
    with:
      bootstrap_tools: "all,golangci-lint2"
      run_version_check: true
      run_dep_version_check: true
      run_build: true
      run_docker_build: true
      run_docker_push: true
      run_version_tag: true
      run_version_dev: true
      prefix_tag_separator: "/"
      project_folder: "tink-worker"
      trivy_image_skip: |
        ghcr.io/github/github-mcp-server:latest,
        ghcr.io/github/gh-aw-mcpg:latest,
        ghcr.io/github/gh-aw-firewall/agent:latest,
        ghcr.io/github/gh-aw-firewall/api-proxy:latest,
        ghcr.io/github/gh-aw-firewall/squid:latest,
        debian@sha256:0a5bf4ecacfc050bad0131c8e1401063fd1e8343a418723f6dbd3cd13a7b9e33
    secrets:
      SYS_EMF_GH_TOKEN: ${{ secrets.SYS_EMF_GH_TOKEN }}
      NO_AUTH_ECR_PUSH_USERNAME: ${{ secrets.NO_AUTH_ECR_PUSH_USERNAME }}
      NO_AUTH_ECR_PUSH_PASSWD: ${{ secrets.NO_AUTH_ECR_PUSH_PASSWD }}
      MSTEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
