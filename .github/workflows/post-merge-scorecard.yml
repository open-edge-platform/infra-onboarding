name: Post-Merge Scorecard CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  call-scorecard:
    permissions:
      security-events: write   # required for SARIF upload
      id-token: write
      contents: read
    uses: open-edge-platform/orch-ci/.github/workflows/post-merge-scorecard.yml@d78f49dde9e0cc25639748de5681484a4d1e0e59  # 2026.0.19
    with:
      project_folder: "."
    secrets:
      SYS_EMF_GH_TOKEN: ${{ secrets.SYS_EMF_GH_TOKEN }}
