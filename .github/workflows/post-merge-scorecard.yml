name: Post-Merge Scorecard CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  call-scorecard:
    permissions:
      security-events: write   # required for SARIF upload
      id-token: write
      contents: read
    uses: open-edge-platform/orch-ci/.github/workflows/post-merge-scorecard.yml@ca0841de53d0e70b4934696601a748bff06fe6d9  # 2026.1.1
    with:
      project_folder: "."
    secrets:
      SYS_EMF_GH_TOKEN: ${{ secrets.SYS_EMF_GH_TOKEN }}
