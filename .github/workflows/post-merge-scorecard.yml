name: Post-Merge Scorecard CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  call-scorecard:
    permissions:
      security-events: write   # required for SARIF upload
      id-token: write
      contents: read
    uses: open-edge-platform/orch-ci/.github/workflows/post-merge-scorecard.yml@072332a8215754f6496bf97c8f3c7559dba5fdc1  # 2026.1.1
    with:
      project_folder: "."
    secrets:
      SYS_EMF_GH_TOKEN: ${{ secrets.SYS_EMF_GH_TOKEN }}
