---
# SPDX-FileCopyrightText: (C) 2026 Intel Corporation
# SPDX-License-Identifier: Apache-2.0

version: "2"
run:
  go: ""
  modules-download-mode: readonly
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
    html:
      path: out/golangci-lint_report.html
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - cyclop
    - dogsled
    - dupl
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goheader
    - goprintffuncname
    - gosec
    - lll
    - misspell
    - mnd
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - tagliatelle
    - testableexamples
    - thelper
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - whitespace
  settings:
    cyclop:
      # NOTE: This is a very high transitional threshold
      max-complexity: 37
      package-average: 34.0
    dupl:
      threshold: 200
    errcheck:
      check-type-assertions: true
      check-blank: true
    errorlint:
      # these are still common in Go: for instance, exit errors.
      asserts: false
      # Forcing %w in error wrapping forces authors to make errors part of their package APIs. The decision to make
      # an error part of a package API should be a concious decision by the author.
      # Also see Hyrums Law.
      errorf: false
    exhaustive:
      default-signifies-exhaustive: true
    funlen:
      lines: 100
      statements: 50
    goconst:
      min-len: 4
      min-occurrences: 5
    gocritic:
      disabled-checks:
        - hugeParam
        - rangeExprCopy
        - rangeValCopy
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gosec:
      excludes:
        - G107 # Potential HTTP request made with variable url
        - G204 # Subprocess launched with function call as argument or cmd arguments
        - G404 # Use of weak random number generator (math/rand instead of crypto/rand
    govet:
      enable:
        - shadow
    lll:
      line-length: 130
      tab-width: 4
    misspell:
      locale: US
    nakedret:
      max-func-lines: 1
    revive:
      severity: warning
      rules:
        - name: atomic
        - name: blank-imports
        - name: bool-literal-in-expr
        - name: confusing-naming
        - name: constant-logical-expr
        - name: context-as-argument
        - name: context-keys-type
        - name: deep-exit
        - name: defer
        - name: range-val-in-closure
        - name: range-val-address
        - name: dot-imports
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: identical-branches
        - name: if-return
        - name: import-shadowing
        - name: increment-decrement
        - name: indent-error-flow
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: struct-tag
        - name: time-naming
        - name: unexported-naming
        - name: unexported-return
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming
        - name: unconditional-recursion
        - name: waitgroup-by-value
    tagliatelle:
      case:
        rules:
          avro: snake
          bson: camel
          json: snake
          mapstructure: kebab
          xml: camel
          yaml: snake
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: (.+)\.go$
        text: Error return value of `.*Close` is not checked
      - path: (.+)\.go$
        text: Error return value of `.*Flush` is not checked
      - path: (.+)\.go$
        text: Error return value of `.*Write` is not checked
      - path: (.+)\.go$
        text: Error return value of `.*Stop` is not checked
      # Intentional type assertion with blank identifier for logger extraction
      - linters:
          - errcheck
        text: "Error return value is not checked"
      - linters:
          - errcheck
        text: "Error return value of `.*BindPFlags` is not checked"
      - linters:
          - errcheck
        text: "Error return value of `.*SetAnnotation` is not checked"
      - linters:
          - errcheck
        text: "Error return value of `task.Delete` is not checked"
      # Existing functions exceed length thresholds; refactoring is out of scope
      - linters:
          - funlen
        path: cmd/tink-worker/worker/(containerd|worker)\.go$
      # Commented-out code kept intentionally for reference
      - linters:
          - gocritic
        text: "commentedOutCode"
      # Variable shadowing is common and intentional in this codebase
      - linters:
          - govet
        text: "shadow"
      # Long lines in function signatures and log statements
      - linters:
          - lll
        path: cmd/tink-worker/
      # Magic numbers in string splitting and known constants
      - linters:
          - mnd
        path: cmd/tink-worker/worker/(containerd|worker)\.go$
      # exec.Command in rebootWatch runs post-workflow; context not available
      - linters:
          - noctx
        path: cmd/tink-worker/worker/containerd\.go$
      # JSON tags are part of existing API contract and cannot be changed
      - linters:
          - tagliatelle
        path: cmd/tink-worker/worker/(worker|registry)\.go$
      # local to tink: kubebuilder needs the stdlib invalid `inline` json struct tag
      - path: api/.*
        text: "struct-tag: unknown option 'inline'"
      - path: .*cmd.*
        text: "deep-exit"
      - path: main\.go
        text: "deep-exit"
      # This check is of questionable value
      - linters:
          - tparallel
        text: "call t.Parallel on the top level as well as its subtests"
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  fix: false
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/open-edge-platform)
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
